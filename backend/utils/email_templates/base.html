<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #111827; }
    .wrapper { max-width: 600px; margin: 32px auto; }
    .header { background: linear-gradient(135deg, #db2777 0%, #9333ea 100%); border-radius: 12px 12px 0 0; padding: 32px; text-align: center; }
    .header h1 { color: #fff; font-size: 24px; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.85); margin-top: 4px; font-size: 14px; }
    .body { background: #fff; padding: 32px; }
    .greeting { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .text { color: #4b5563; line-height: 1.6; margin-bottom: 12px; }
    .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin: 20px 0; }
    .card-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .card-row:last-child { border-bottom: none; }
    .card-row .label { color: #6b7280; }
    .card-row .value { font-weight: 600; color: #111827; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: #dcfce7; color: #15803d; }
    .badge-purple { background: #f3e8ff; color: #7e22ce; }
    .badge-orange { background: #ffedd5; color: #c2410c; }
    .btn { display: inline-block; margin: 20px 0; padding: 14px 32px; background: #db2777; color: #fff !important; border-radius: 8px; font-weight: 600; font-size: 15px; text-decoration: none; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .footer { background: #f9fafb; border-radius: 0 0 12px 12px; padding: 20px 32px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
    .footer a { color: #db2777; text-decoration: none; }
    .total-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 16px; font-weight: 700; color: #db2777; }
    .status-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>TiendaRopa</h1>
      <p>Tu marketplace de moda</p>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>Este email fue enviado automáticamente por <a href="{{ frontend_url }}">TiendaRopa</a>.</p>
      <p style="margin-top:6px;">Si tenés dudas, respondé este email o contactanos.</p>
    </div>
  </div>
</body>
</html>
